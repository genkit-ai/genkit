name: Bump and Tag JS Version

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        type: choice
        default: auto
        required: true
        options:
          - auto
          - rc
          - graduate
      rcTag:
        description: Pre-release identifier (only used for "rc" mode)
        type: string
        default: rc
        required: false

jobs:
  build:
    name: Version bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GENKIT_RELEASER_GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - name: Set up node v20
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Setup
        shell: bash
        run: |
          git config --global user.email "genkit-releaser@google.com"
          git config --global user.name "genkit-releaser"

      - name: Bump and Tag
        shell: bash
        run: |
          ARGS=""
          if [ "${{ inputs.mode }}" = "rc" ]; then
            ARGS="--rc ${{ inputs.rcTag }}"
          elif [ "${{ inputs.mode }}" = "graduate" ]; then
            ARGS="--graduate"
          fi
          npx tsx js/scripts/version.ts $ARGS

      - name: Push
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GENKIT_RELEASER_GITHUB_TOKEN }}
        run: |
          git log --tags --decorate
          git remote set-url --push origin https://genkit-releaser:$GITHUB_TOKEN@github.com/firebase/genkit
          git push
          git push --tags origin
